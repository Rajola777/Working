<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crunk Games</title>

<link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
<link rel="stylesheet" href="home.css">
</head>
<body>

<div class="app">

  <!-- TOPBAR -->
  <header class="topbar">
    <div class="brand"><h1>Crunk games</h1></div>

    <div class="topbar-right">
      <!-- Google Profile -->
      <div class="profile-dropdown">
        <img id="googleProfilePic" src="placeholder.png" alt="Profile">
        <div class="dropdown-menu">
          <div class="account-info">
            <img id="dropdownProfilePic" src="placeholder.png">
            <div>
              <p id="accountName">User Name</p>
              <p id="accountEmail">user@example.com</p>
            </div>
          </div>
          <button id="logoutBtn">Logout</button>
        </div>
      </div>

      <!-- Notification -->
      <i class="bx bx-bell" id="notificationBtn"></i>
    </div>
  </header>

  <!-- HAMBURGER MENU STATIC LINKS -->
  <div class="sidebar">
    <ul class="sidebar-menu">
      <li id="menuSettings">Settings</li>
      <li id="menuPrivacy">Privacy & Policy</li>
      <li id="menuShare">Share</li>
      <li id="menuHelp">Help / Support</li>
      <li id="menuRate">Rate App</li>
      <li id="menuAbout">About</li>
    </ul>
  </div>

  <!-- SEARCH -->
  <div class="search">
    <i class="bx bx-search"></i>
    <input type="text" id="searchInput" placeholder="Search for Games, Competition..." />
  </div>

  <!-- PROMO -->
  <div class="promo">
    <div class="promo-icon"><i class="bx bxs-gift"></i></div>
    <div class="promo-text">
      <h2>Free venocoins</h2>
    </div>
    <button class="claim">Claim</button>
  </div>

  <!-- SLIDER -->
  <div class="slider">
    <div class="slides"></div>
    <div class="dots"></div>
  </div>

  <!-- GAMES GRID -->
  <div class="games" id="gamesContainer"></div>

  <!-- GAME POPUP -->
  <div id="gamePopup" class="popup">
    <div class="popup-content">
      <span class="close">✖</span>
      <img id="popupImg">
      <h2 id="popupTitle"></h2>
      <div id="popupRating"></div>
      <div id="popupDate"></div>
      <p id="popupDesc"></p>
      <div id="popupTrailer"></div>
      <div id="popupScreens"></div>
      <a id="popupDownload"><button>Download</button></a>
    </div>
  </div>

</div>

<script src="home.js"></script>
</body>
</html>
